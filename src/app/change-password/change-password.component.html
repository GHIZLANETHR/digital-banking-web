<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header">Change Password</div>
        <div class="card-body">
          <div *ngIf="message" class="alert alert-success">{{message}}</div>
          <div *ngIf="error" class="alert alert-danger">{{error}}</div>
          <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
            <div class="mb-3"><label>Old Password</label><input type="password" formControlName="oldPassword" class="form-control"></div>
            <div class="mb-3"><label>New Password</label><input type="password" formControlName="newPassword" class="form-control"></div>
            <div class="mb-3"><label>Confirm Password</label><input type="password" formControlName="confirmPassword" class="form-control"></div>
            <button class="btn btn-primary w-100" [disabled]="passwordForm.invalid">Change</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
