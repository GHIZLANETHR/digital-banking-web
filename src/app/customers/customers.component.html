<!-- customers.component.html -->
<div class="container mt-2">
  <ng-container *ngIf="customers$ | async as listCustomers; else failureOrLoading">
    <div class="card">
      <div class="card-header">Customers</div>
      <div class="card-body">
        <form [formGroup]="searchFormGroup" (ngSubmit)="handleSearchCustomers()">
          <div class="input-group">
            <label class="input-group-text">Keyword :</label>
            <input type="text" formControlName="keyword" class="form-control">
            <button class="btn btn-info"><i class="bi bi-search"></i> Search</button>
          </div>
        </form>
        <table class="table table-striped mt-2">
          <thead>
          <tr><th>ID</th><th>Name</th><th>Email</th><th>Created By</th><th>Updated By</th><th>Actions</th></tr>
          </thead>
          <tbody>
          <tr *ngFor="let c of listCustomers">
            <td>{{c.id}}</td><td>{{c.name}}</td><td>{{c.email}}</td>
            <td>{{c.createdBy || '-'}}</td><td>{{c.updatedBy || '-'}}</td>
            <td>
              <button class="btn btn-sm btn-warning me-1" (click)="openEditModal(c)">Edit</button>
              <button class="btn btn-sm btn-danger" (click)="handleDeleteCustomer(c)">Delete</button>
              <button class="btn btn-sm btn-success ms-1" (click)="handleCustomerAccounts(c)">Accounts</button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </ng-container>
  <ng-template #failureOrLoading>
    <ng-container *ngIf="errorMessage; else loading">
      <div class="text-danger">{{errorMessage}}</div>
    </ng-container>
    <ng-template #loading>Loading ...</ng-template>
  </ng-template>
</div>

<!-- Modal d'édition -->
<div class="modal" tabindex="-1" [style.display]="selectedCustomer ? 'block' : 'none'">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Customer</h5>
        <button type="button" class="btn-close" (click)="selectedCustomer=null"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="editFormGroup">
          <div class="mb-2"><label>Name</label><input formControlName="name" class="form-control"></div>
          <div class="mb-2"><label>Email</label><input formControlName="email" class="form-control"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="selectedCustomer=null">Cancel</button>
        <button class="btn btn-primary" (click)="saveEdit()">Save</button>
      </div>
    </div>
  </div>
</div>
